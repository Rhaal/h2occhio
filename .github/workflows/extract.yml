name: Extract SIR Toscana data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sir-toscana-extraction
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract SIR data
        run: npm run extraction

      - name: Commit updated data
        run: |
          if [ -z "$(git status --porcelain -- docs/data docs/index.html)" ]; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data docs/index.html
          git commit -m "chore: Update SIR Toscana data"
          git push
